<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Social Login UI Demo</title>
  <style>
    :root {
      --primary: #1877f2;
      --primary-dark: #145dbf;
      --success: #42b72a;
      --success-dark: #369423;
      --bg-start: #eef4ff;
      --bg-end: #f7f9fc;
      --text: #1c1e21;
      --muted: #65676b;
      --border: #dce1e7;
      --card: #ffffff;
      --shadow: 0 20px 45px rgba(24, 119, 242, 0.16);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, Helvetica, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(24, 119, 242, 0.16), transparent 32%),
        linear-gradient(135deg, var(--bg-start), var(--bg-end));
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .page {
      width: min(100%, 980px);
      display: grid;
      grid-template-columns: 1.1fr 420px;
      gap: 56px;
      align-items: center;
    }

    .hero h1 {
      margin: 0 0 14px;
      color: var(--primary);
      font-size: clamp(2.4rem, 6vw, 4.2rem);
      line-height: 1;
      letter-spacing: -2px;
    }

    .hero p {
      margin: 0;
      max-width: 500px;
      font-size: clamp(1.1rem, 2vw, 1.6rem);
      line-height: 1.35;
    }

    .demo-note {
      margin-top: 22px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 14px;
      border: 1px solid rgba(24, 119, 242, 0.24);
      border-radius: 999px;
      color: var(--muted);
      background: rgba(255, 255, 255, 0.7);
      font-size: 0.95rem;
    }

    .card {
      background: var(--card);
      border: 1px solid rgba(255, 255, 255, 0.7);
      border-radius: 20px;
      box-shadow: var(--shadow);
      padding: 24px;
    }

    .card-header {
      text-align: center;
      margin-bottom: 20px;
    }

    .logo-mark {
      width: 56px;
      height: 56px;
      margin: 0 auto 12px;
      border-radius: 16px;
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, var(--primary), #58a6ff);
      color: white;
      font-size: 2rem;
      font-weight: 800;
      box-shadow: 0 10px 22px rgba(24, 119, 242, 0.28);
    }

    .card-header h2 {
      margin: 0 0 6px;
      font-size: 1.45rem;
    }

    .card-header p {
      margin: 0;
      color: var(--muted);
      font-size: 0.95rem;
    }

    form {
      display: grid;
      gap: 14px;
    }

    .input-group label {
      display: block;
      margin-bottom: 7px;
      font-size: 0.9rem;
      color: var(--muted);
      font-weight: 700;
    }

    .input-group input {
      width: 100%;
      padding: 14px 15px;
      border: 1px solid var(--border);
      border-radius: 12px;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s ease, box-shadow 0.2s ease, transform 0.2s ease;
    }

    .input-group input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 4px rgba(24, 119, 242, 0.12);
    }

    .btn {
      width: 100%;
      border: 0;
      border-radius: 12px;
      padding: 14px 18px;
      color: white;
      font-size: 1rem;
      font-weight: 800;
      cursor: pointer;
      transition: transform 0.15s ease, background-color 0.2s ease, box-shadow 0.2s ease;
    }

    .btn:hover {
      transform: translateY(-1px);
    }

    .btn:active {
      transform: translateY(0);
    }

    .btn-primary {
      background: var(--primary);
      box-shadow: 0 10px 20px rgba(24, 119, 242, 0.24);
    }

    .btn-primary:hover {
      background: var(--primary-dark);
    }

    .btn-success {
      width: auto;
      justify-self: center;
      background: var(--success);
      padding-inline: 22px;
    }

    .btn-success:hover {
      background: var(--success-dark);
    }

    .forgot-pass {
      text-align: center;
      color: var(--primary);
      text-decoration: none;
      font-size: 0.95rem;
      font-weight: 700;
    }

    .forgot-pass:hover {
      text-decoration: underline;
    }

    .divider {
      height: 1px;
      background: var(--border);
      margin: 8px 0;
    }

    .fine-print {
      margin: 18px 0 0;
      text-align: center;
      color: var(--muted);
      font-size: 0.82rem;
      line-height: 1.45;
    }

    @media (max-width: 820px) {
      .page {
        grid-template-columns: 1fr;
        gap: 28px;
        text-align: center;
      }

      .hero p {
        margin-inline: auto;
      }
    }

    @media (max-width: 480px) {
      body {
        padding: 16px;
      }

      .card {
        padding: 20px;
        border-radius: 16px;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="hero" aria-labelledby="page-title">
      <h1 id="page-title">SocialConnect</h1>
      <p>A modern, responsive login screen made as a front-end design demo.</p>
      <div class="demo-note" aria-label="Demo notice">✨ UI demo only — no real sign-in</div>
    </section>

    <section class="card" aria-label="Login form demo">
      <div class="card-header">
        <div class="logo-mark" aria-hidden="true">S</div>
        <h2>Welcome back</h2>
        <p>Sign in to continue to your account</p>
      </div>

      <form action="#" method="post">
        <div class="input-group">
          <label for="email">Email or phone</label>
          <input type="text" id="email" name="email" placeholder="name@example.com" autocomplete="username" required />
        </div>

        <div class="input-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" placeholder="Enter your password" autocomplete="current-password" required />
        </div>

        <button type="submit" class="btn btn-primary">Log in</button>
        <a href="#" class="forgot-pass">Forgot password?</a>

        <div class="divider" role="presentation"></div>

        <button type="button" class="btn btn-success">Create new account</button>
      </form>

      <p class="fine-print">This page is for layout practice only. Do not use it to collect real passwords or impersonate another service.</p>
    </section>
  </main>
</body>
</html>
